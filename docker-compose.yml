version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: collaboration_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - collaboration_network

  redis:
    image: redis:7.0-alpine
    container_name: collaboration_redis
    ports:
      - "6379:6379"
    networks:
      - collaboration_network

networks:
  collaboration_network:
    driver: bridge

volumes:
  mongo_data:
